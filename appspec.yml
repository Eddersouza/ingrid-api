version: 0.0
os: linux

files:
  - source: /
    destination: /usr/share/nginx/html

hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 300
      runas: ec2-user

  AfterInstall:
    - location: scripts/install.sh
      timeout: 300
      runas: ec2-user

  ApplicationStart:
    - location: scripts/start.sh
      timeout: 300
      runas: ec2-user

  ValidateService:
    - location: scripts/healthcheck.sh
      timeout: 60
      runas: ec2-user
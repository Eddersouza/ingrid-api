version: 0.0
os: linux

files:
  - source: build/
    destination: /var/www/backend

  - source: deploy/systemd/backend.service
    destination: /etc/systemd/system/backend.service

hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/install.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/start.sh
      timeout: 300
      runas: root

  ValidateService:
    - location: scripts/healthcheck.sh
      timeout: 60
      runas: root
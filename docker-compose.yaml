services:
  ingrid-mysql:
    image: mysql:9.4.0
    container_name: 'ingrid-DB-mysql'
    environment:
      MYSQL_DATABASE: 'IDI'
      MYSQL_USER: 'ingrid_db_user'
      MYSQL_PASSWORD: 'password'
      MYSQL_ROOT_PASSWORD: 'password'
    ports:
      - '1002:3306'
    restart: unless-stopped
    volumes:
      - 'c:\_db_docker\dbmysql\ingrid_DB_mysql:/var/lib/mysql'